name: Deploy to AWS (ECR + EC2)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO: ${{ secrets.ECR_REPO }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'devops-app' }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'devops-app' }}
  HOST_PORT: ${{ vars.HOST_PORT || '80' }}
  CONTAINER_PORT: ${{ vars.CONTAINER_PORT || '3000' }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        run: |
          set -e
          docker build -t "$IMAGE_NAME:$IMAGE_TAG" .
          docker tag "$IMAGE_NAME:$IMAGE_TAG" "$ECR_REPO:$IMAGE_TAG"
          docker tag "$IMAGE_NAME:$IMAGE_TAG" "$ECR_REPO:latest"
          docker push "$ECR_REPO:$IMAGE_TAG"
          docker push "$ECR_REPO:latest"

      - name: Deploy to EC2 with SSM
        env:
          PORT: ${{ env.HOST_PORT }}
        run: |
          set -e

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy $GITHUB_SHA from GitHub Actions" \
            --parameters commands='[
              "set -e",
              "aws ecr get-login-password --region '"$AWS_REGION"' | docker login --username AWS --password-stdin '"$(printf '%s' "$ECR_REPO" | cut -d/ -f1)"'",
              "docker pull '"$ECR_REPO:$IMAGE_TAG"'",
              "docker rm -f '"$CONTAINER_NAME"' || true",
              "docker run -d --name '"$CONTAINER_NAME"' --restart unless-stopped -e PORT='"$CONTAINER_PORT"' -e AWS_REGION='"$AWS_REGION"' -p '"$PORT:$CONTAINER_PORT"' '"$ECR_REPO:$IMAGE_TAG"'",
              "sleep 5",
              "curl -fsS http://127.0.0.1:'"$PORT"'/health"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'Status' \
            --output text)

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}'

          test "$STATUS" = "Success"
